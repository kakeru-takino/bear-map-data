name: Download Bear Map KML

on:
  schedule:
    - cron: '0 18 * * *'  # 毎日 UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download KML (Shizukuishi)
        run: |
          mkdir -p data
          curl -L "https://www.google.com/maps/d/kml?mid=1vvY_OIMBINPBK2FPFh230vuF-TLxbAQ&forcekml=1" \
            -o "data/bear_map_shizukuishi.kml"

      - name: Download KML (Morioka)
        run: |
          mkdir -p data
          curl -L "https://www.google.com/maps/d/kml?mid=1QnVCL8lSy4tc9bPEhAXTBsK6SQ0ztwc&forcekml=1" \
            -o "data/bear_map_morioka.kml"

      - name: Filter current year
        run: |
          YEAR=$(date +%Y)
          # 盛岡は<name>の和暦年で今年分に絞り込む。雫石は年情報が無いため全件保持。
          python3 scripts/filter_current_year.py \
            data/bear_map_morioka.kml "data/bear_map_morioka_${YEAR}.kml"
          python3 scripts/filter_current_year.py \
            data/bear_map_shizukuishi.kml "data/bear_map_shizukuishi_${YEAR}.kml"

      - name: Commit and push
        run: |
          YEAR=$(date +%Y)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bear_map_shizukuishi.kml data/bear_map_morioka.kml \
            "data/bear_map_morioka_${YEAR}.kml" "data/bear_map_shizukuishi_${YEAR}.kml"
          git diff --cached --quiet || git commit -m "chore: update bear map KML $(date +%Y-%m-%d)"
          git push

      - name: Upload to Google Drive
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          YEAR=$(date +%Y)
          pip install --quiet google-auth google-auth-httplib2 google-api-python-client
          # 生KMLと年別フィルタ済みの両方をDriveの定位置(同名を上書き)に保存する。
          python3 scripts/upload_to_drive.py \
            data/bear_map_shizukuishi.kml data/bear_map_morioka.kml \
            "data/bear_map_morioka_${YEAR}.kml" "data/bear_map_shizukuishi_${YEAR}.kml"
